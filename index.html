<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GratiLog - 감사일기 에디터 데모</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <div class="layout">
    <!-- LEFT SIDEBAR: Navigation -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>GratiLog</h2>
        <p>감사일기 에디터 데모</p>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-item active">A. 대화형</div>
        <div class="sidebar-item">B. 퀵 액션</div>
        <div class="sidebar-item">C. 진행도</div>
      </nav>
      <div class="sidebar-footer">
        <p>3가지 에디터를 체험해 보세요</p>
      </div>
    </aside>

    <!-- Section A: Chat-based Editor -->
    <div class="editor-column">
      <div class="mobile-frame" id="section-a">
        <div class="frame-header">
          <span class="frame-title">A. 대화형 에디터</span>
          <span class="frame-time" data-clock></span>
        </div>
        <div class="frame-body" id="chat-area-a"></div>
        <div class="guide-overlay" id="guide-overlay-a">
          [대상] 덕분에, [감정]을 함께 누릴 수 있어 감사합니다.
        </div>
        <div class="frame-input">
          <div class="input-row">
            <textarea id="input-a" class="text-input" rows="1" placeholder="감사한 것을 자유롭게 적어보세요..."></textarea>
            <button class="btn-send" id="send-a" disabled aria-label="전송">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
        <div class="frame-submit">
          <button class="btn-submit" id="submit-a">오늘 제출</button>
        </div>
      </div>
    </div>

    <!-- Section B: Quick Action Editor -->
    <div class="editor-column">
      <div class="mobile-frame" id="section-b">
        <div class="frame-header">
          <span class="frame-title">B. 퀵 액션 에디터</span>
          <span class="frame-time" data-clock></span>
        </div>
        <div class="frame-body" id="card-area-b"></div>
        <!-- Emotion chips (hidden by default) -->
        <div class="emotion-chips" id="emotion-chips-b">
          <button class="chip" data-emotion="기쁨" style="--chip-color:#FFD700">기쁨</button>
          <button class="chip" data-emotion="즐거움" style="--chip-color:#FFA07A">즐거움</button>
          <button class="chip" data-emotion="행복" style="--chip-color:#FF69B4">행복</button>
          <button class="chip" data-emotion="소망" style="--chip-color:#87CEEB">소망</button>
          <button class="chip" data-emotion="소속감" style="--chip-color:#98D8C8">소속감</button>
        </div>
        <!-- Tag bottom sheet (hidden by default) -->
        <div class="tag-sheet" id="tag-sheet-b">
          <div class="tag-sheet-title">감사 대상을 선택하세요</div>
          <div class="tag-sheet-chips">
            <button class="tag-chip" data-tag="하나님" style="--tag-color:#6C63FF">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11 2v8H3v2h8v8h2v-8h8v-2h-8V2h-2z"/></svg>
              하나님
            </button>
            <button class="tag-chip" data-tag="이웃/공동체" style="--tag-color:#FF6B6B">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
              이웃/공동체
            </button>
            <button class="tag-chip" data-tag="나 자신" style="--tag-color:#4ECDC4">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              나 자신
            </button>
          </div>
        </div>
        <!-- Mic overlay (hidden by default) -->
        <div class="mic-overlay" id="mic-overlay-b">
          <div class="mic-icon-pulse">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="#6C63FF"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </div>
          <div class="mic-label">듣고 있어요...</div>
          <div class="mic-actions">
            <button class="mic-btn" id="mic-cancel-b">취소</button>
            <button class="mic-btn mic-btn-primary" id="mic-done-b">완료</button>
          </div>
        </div>
        <div class="frame-input">
          <div class="input-row">
            <textarea id="input-b" class="text-input" rows="1" placeholder="감사를 입력하세요..."></textarea>
            <button class="btn-send" id="send-b" disabled aria-label="전송">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
        <div class="quick-actions">
          <button class="qa-btn" id="qa-tag-b" aria-label="관계 태그">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </button>
          <button class="qa-btn" id="qa-emotion-b" aria-label="감정 태그">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
          </button>
          <button class="qa-btn" id="qa-mic-b" aria-label="음성 입력">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </button>
        </div>
        <div class="frame-submit">
          <button class="btn-submit" id="submit-b">오늘 제출</button>
        </div>
      </div>
    </div>

    <!-- Section C: Progress Editor -->
    <div class="editor-column">
      <div class="mobile-frame" id="section-c">
        <div class="frame-header">
          <span class="frame-title">C. 진행도 에디터</span>
          <span class="frame-time" data-clock></span>
        </div>
        <div class="progress-section">
          <div class="progress-label">오늘의 감사 진행도</div>
          <div class="progress-row" id="progress-row-c">
            <div class="progress-icon dim" data-stage="1"><span class="icon-inner"></span></div>
            <div class="progress-icon dim" data-stage="2"><span class="icon-inner"></span></div>
            <div class="progress-icon dim" data-stage="3"><span class="icon-inner"></span></div>
            <div class="progress-icon dim" data-stage="4"><span class="icon-inner"></span></div>
            <div class="progress-icon dim" data-stage="5"><span class="icon-inner"></span></div>
          </div>
          <div class="progress-counter" id="progress-counter-c">0/5 완료</div>
          <div class="toast-container" id="toast-c"></div>
        </div>
        <div class="frame-body" id="card-area-c"></div>
        <div class="frame-input">
          <div class="input-row">
            <textarea id="input-c" class="text-input" rows="1" placeholder="첫 번째 감사를 적어보세요..."></textarea>
            <button class="btn-send" id="send-c" disabled aria-label="전송">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
        <div class="frame-submit">
          <button class="btn-submit" id="submit-c">오늘 제출</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/scenarios.js"></script>
  <script src="js/section-a.js"></script>
  <script src="js/section-b.js"></script>
  <script src="js/section-c.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
